<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} — {{ .Site.Params.name }}</title>
  <link rel="stylesheet" href="{{ "css/style.css" | absURL }}">
</head>
<body>
  {{ partial "header.html" . }}

  <section class="wrap page-content">
    <h1>{{ .Title }}</h1>
    {{ .Content }}

    {{ if eq .Section "blog" }}
    <ul class="post-list">
      {{ range .Pages.ByDate.Reverse }}
        <li>
          <a href="{{ .Permalink }}">{{ .Title }}</a>
          <span class="date">{{ .Date.Format "Jan 2, 2006" }}</span>
          <p>{{ .Summary }}</p>
        </li>
      {{ end }}
    </ul>
    {{ end }}
  </section>

  {{ partial "footer.html" . }}
</body>
</html>
